services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: cefet-suporte-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health', timeout=3).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - cefet-net

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: cefet-suporte-frontend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      # Em rede compose, o backend é alcançado pelo nome do serviço.
      CHATBOT_API_URL: http://backend:8000/chat
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_started
    networks:
      - cefet-net

networks:
  cefet-net:
    driver: bridge
